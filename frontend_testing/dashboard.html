<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>
    welcome to dashboard

    Profile ID: <span id="profileId"></span>
    Name: <span id="firstName"></span>


<script>
    // Retrieve the profile ID from localStorage and display it
    const profileId = localStorage.getItem("profileId");
    const firstName = localStorage.getItem("firstName");
    document.getElementById("profileId").textContent = profileId ? profileId : "No profile ID found.";
    document.getElementById("firstName").textContent = firstName ? firstName : "No profile ID found.";    
</script>
</body>
</html>
